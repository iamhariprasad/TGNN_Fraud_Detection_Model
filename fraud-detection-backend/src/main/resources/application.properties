server.port=8080
server.servlet.context-path=/api

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/fraud_detection?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=hari123
# NOTE: If your MySQL password is not blank, change the value above to your password

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Disable H2 Console (since we are on MySQL now)
spring.h2.console.enabled=false

model.api.url=http://localhost:8000/predict
model.api.timeout=5000
cors.allowed-origins=http://localhost:3000,http://localhost:8080
jwt.secret=tgnn-fraud-detection-secret-key-change-in-production-256bit
jwt.expiration=86400000
logging.level.org.springframework.web=INFO
logging.level.com.fraud=DEBUG
spring.security.user.name=admin
spring.security.user.password=admin123
